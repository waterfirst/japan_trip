<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Japan Trip Journal</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1115;
        --panel: #171a21;
        --text: #eef2f7;
        --muted: #aab4c3;
        --line: #2b3240;
        --accent: #7cc7ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #0e1117, #131722 40%, #0f1115);
        color: var(--text);
        line-height: 1.65;
      }
      .wrap { max-width: 920px; margin: 0 auto; padding: 32px 20px 80px; }
      .hero, .entry {
        background: rgba(23, 26, 33, 0.92);
        border: 1px solid var(--line);
        border-radius: 22px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      }
      .hero { padding: 28px; margin-bottom: 24px; }
      h1, h2, p { margin: 0; }
      h1 { font-size: 2rem; margin-bottom: 10px; }
      .sub { color: var(--muted); }
      .guide {
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 14px;
        background: rgba(124, 199, 255, 0.08);
        color: #d7ebff;
        font-size: 0.95rem;
      }
      .entry { margin-top: 20px; }
      .entry img {
        width: 100%;
        display: block;
        object-fit: cover;
        max-height: 620px;
        background: #0b0d12;
      }
      .entry-body { padding: 18px 20px 22px; }
      .meta {
        display: inline-block;
        margin-bottom: 10px;
        font-size: 0.85rem;
        color: var(--accent);
      }
      .comment {
        margin-top: 12px;
        color: var(--muted);
        font-size: 0.95rem;
      }
      .empty {
        text-align: center;
        padding: 56px 20px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <h1>일본 여행 기록</h1>
        <p class="sub">사진 한 장씩 쌓아가며 남기는 여행 에세이 아카이브</p>
        <div class="guide">
          여행 중 사진을 올리면 이 페이지에 지역명, 짧은 감상, 현장 분위기를 자연스럽게 이어 붙입니다.
        </div>
      </section>

      <section class="entry">
        <div class="empty">
          첫 여행 사진을 기다리는 중입니다.<br />
          사진이 올라오면 가장 최신 기록이 위에 추가됩니다.
        </div>
      </section>
    </main>
  </body>
</html>
